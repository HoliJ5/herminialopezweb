<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería | Herminia López</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap');
        .font-serif { font-family: 'Playfair Display', serif; }
        .font-sans { font-family: 'Inter', sans-serif; }
        /* Tipografía fluida usando clamp() y rem/vw para el título en pantallas gigantes */
        .titulo-fluido {
            font-size: clamp(1.75rem, 4vw, 3rem);
        }
    </style>
</head>
<body class="opacity-0 transition-opacity duration-500 ease-in-out bg-[#fafafa] text-[#1c1c1c] font-sans antialiased flex flex-col min-h-screen text-base">

    <div id="nav-placeholder"></div>

    <main class="flex-grow max-w-6xl mx-auto px-4 sm:px-6 py-8 md:py-12 w-full">
        
        <h2 class="font-serif titulo-fluido font-normal mb-6 text-center">Galeria</h2>
        
        <div class="flex flex-wrap justify-center gap-x-6 gap-y-2 text-xs sm:text-sm font-medium tracking-wide uppercase text-neutral-500 mb-4">
            <button id="btn-todos" class="bg-transparent hover:text-[#4b262a] transition-colors py-1">Mostrar todos</button>
            <button id="btn-cuadros" class="bg-transparent hover:text-[#4b262a] transition-colors py-1">Cuadros</button>
            <button id="btn-ropa" class="bg-transparent hover:text-[#4b262a] transition-colors py-1">Ropa</button>
        </div>

        <div id="subfiltros-contenedor" class="flex flex-wrap justify-center gap-x-4 gap-y-2 text-[11px] sm:text-xs font-medium tracking-wide uppercase text-neutral-400 mb-8 hidden">
        </div>

        <div id="galeria-contenedor" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-6 md:gap-8"></div>
        
        <div id="info-subtipos-contenedor" class="mt-16 md:mt-24 pt-10 border-t border-neutral-200 flex flex-col gap-12 md:gap-20 empty:hidden">
        </div>
    </main>

    <div id="footer-placeholder" class="mt-auto"></div>

    <div id="modal-obra" class="fixed inset-0 bg-black/95 z-50 flex items-center justify-center hidden" role="dialog" aria-modal="true" aria-labelledby="modal-titulo">
        <button id="modal-cerrar" class="absolute top-4 right-4 sm:top-6 sm:right-6 text-white/80 hover:text-white text-3xl sm:text-4xl font-light leading-none transition-colors z-50" aria-label="Cerrar vista completa">&times;</button>
        
        <div class="relative max-w-4xl max-h-[95vh] w-full px-4 flex flex-col items-center justify-center overflow-y-auto py-6">
            
            <!-- Imagen principal con altura fija para evitar saltos y movimientos del contenido -->
            <img id="modal-imagen" src="" alt="" class="w-full h-[50vh] sm:h-[60vh] object-contain transition-opacity duration-300">
            
            <div id="modal-miniaturas" class="flex gap-2 sm:gap-3 mt-4 sm:mt-6 overflow-x-auto max-w-full pb-2 scrollbar-none"></div>

            <div id="modal-info" class="text-center text-white mt-4 max-w-xl px-2">
                <h3 id="modal-titulo" class="font-serif text-xl sm:text-2xl font-medium"></h3>
                <p id="modal-detalles" class="text-xs sm:text-sm text-neutral-300 mt-1"></p>
            </div>
            
        </div>
    </div>

    <script src="componentes.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const contenedor = document.getElementById('galeria-contenedor');
            const modal = document.getElementById('modal-obra');
            const modalImagen = document.getElementById('modal-imagen');
            const modalTitulo = document.getElementById('modal-titulo');
            const modalDetalles = document.getElementById('modal-detalles');
            const modalCerrar = document.getElementById('modal-cerrar');
            const modalMiniaturas = document.getElementById('modal-miniaturas');

            let obrasData = [];
            let infoData = [];
            let filtroActual = 'todos';
            let subfiltroActual = 'todos';

            function abrirModal(obra) {
                modalImagen.src = obra.imagen;
                modalImagen.alt = obra.titulo;
                modalTitulo.textContent = obra.titulo;
                modalDetalles.textContent = `${obra.tecnica} — ${obra.anio}`;
                modalMiniaturas.innerHTML = '';

                const todasLasImagenes = [obra.imagen];
                if (obra.imagenes && obra.imagenes.length > 0) {
                    todasLasImagenes.push(...obra.imagenes);
                }

                if (todasLasImagenes.length > 1) {
                    todasLasImagenes.forEach((imgSrc, index) => {
                        const thumb = document.createElement('img');
                        thumb.src = imgSrc;
                        thumb.alt = `Vista ${index + 1} de ${obra.titulo}`;
                        // Tamaño de miniatura adaptable (rem/px controlado mediante Tailwind)
                        thumb.className = 'w-12 h-12 sm:w-16 sm:h-16 flex-shrink-0 object-cover cursor-pointer border-2 transition-all duration-200';
                        
                        if (index === 0) {
                            thumb.classList.add('border-white', 'opacity-100');
                        } else {
                            thumb.classList.add('border-transparent', 'opacity-50', 'hover:opacity-100');
                        }
                        
                        thumb.addEventListener('click', () => {
                            modalImagen.src = imgSrc;
                            Array.from(modalMiniaturas.children).forEach(t => {
                                t.classList.remove('border-white', 'opacity-100');
                                t.classList.add('border-transparent', 'opacity-50', 'hover:opacity-100');
                            });
                            thumb.classList.remove('border-transparent', 'opacity-50', 'hover:opacity-100');
                            thumb.classList.add('border-white', 'opacity-100');
                        });

                        modalMiniaturas.appendChild(thumb);
                    });
                }

                modal.classList.remove('hidden');
                document.body.style.overflow = 'hidden';
            }

            function cerrarModal() {
                modal.classList.add('hidden');
                modalImagen.src = '';
                modalMiniaturas.innerHTML = '';
                document.body.style.overflow = '';
            }

            function renderizerSubfiltros() {
                const contenedorSub = document.getElementById('subfiltros-contenedor');
                contenedorSub.innerHTML = '';

                if (filtroActual === 'todos') {
                    contenedorSub.classList.add('hidden');
                    return;
                }

                const subtipos = [...new Set(obrasData
                    .filter(o => o.tipo === filtroActual && o.subtipo)
                    .map(o => o.subtipo)
                )];

                if (subtipos.length === 0) {
                    contenedorSub.classList.add('hidden');
                    return;
                }

                contenedorSub.classList.remove('hidden');

                const btnTodosSub = document.createElement('button');
                btnTodosSub.textContent = 'Todos';
                btnTodosSub.className = `bg-transparent hover:text-[#4b262a] transition-colors py-1 ${subfiltroActual === 'todos' ? 'text-black font-semibold' : ''}`;
                btnTodosSub.addEventListener('click', () => {
                    subfiltroActual = 'todos';
                    aplicarFiltro();
                    renderizerSubfiltros();
                });
                contenedorSub.appendChild(btnTodosSub);

                subtipos.forEach(sub => {
                    const btn = document.createElement('button');
                    btn.textContent = sub;
                    btn.className = `bg-transparent hover:text-[#4b262a] transition-colors py-1 ${subfiltroActual === sub ? 'text-black font-semibold' : ''}`;
                    btn.addEventListener('click', () => {
                        subfiltroActual = sub;
                        aplicarFiltro();
                        renderizerSubfiltros();
                    });
                    contenedorSub.appendChild(btn);
                });
            }

            function renderizarInfoSubtipos() {
                const contenedorInfo = document.getElementById('info-subtipos-contenedor');
                contenedorInfo.innerHTML = '';

                const infoFiltrada = infoData.filter(info => {
                    const cumpleTipo = filtroActual === 'todos' || info.tipo === filtroActual;
                    const cumpleSubtipo = subfiltroActual === 'todos' || info.subtipo === subfiltroActual;
                    return cumpleTipo && cumpleSubtipo;
                });

                infoFiltrada.forEach((info, index) => {
                    // En móvil se apilan en columna (flex-col). Desde pantallas medianas alternan dirección.
                    const direccionFlex = index % 2 === 0 ? 'md:flex-row' : 'md:flex-row-reverse';

                    let collageHtml = '';
                    if (info.imagenes && info.imagenes.length > 0) {
                        const gridCols = info.imagenes.length === 1 ? 'grid-cols-1' : 'grid-cols-2';
                        
                        collageHtml = `<div class="w-full md:w-1/2 grid ${gridCols} gap-3 sm:gap-4">`;
                        info.imagenes.forEach(img => {
                            collageHtml += `
                                <div class="overflow-hidden bg-neutral-100 aspect-square rounded-sm">
                                    <img src="${img}" alt="Ejemplo de ${info.subtipo}" class="w-full h-full object-cover">
                                </div>
                            `;
                        });
                        collageHtml += `</div>`;
                    }

                    const bloqueInfo = document.createElement('div');
                    bloqueInfo.className = `flex flex-col ${direccionFlex} gap-6 md:gap-12 items-center w-full`;
                    
                    // Interpretación nativa de innerHTML para admitir etiquetas <strong> en info.json
                    bloqueInfo.innerHTML = `
                        <div class="w-full md:w-1/2 flex flex-col justify-center text-left md:text-left">
                            <h3 class="font-serif text-2xl sm:text-3xl font-medium mb-3 capitalize text-neutral-800">${info.subtipo}</h3>
                            <p class="text-neutral-600 text-sm sm:text-base leading-relaxed">${info.descripcion}</p>
                        </div>
                        ${collageHtml}
                    `;
                    
                    contenedorInfo.appendChild(bloqueInfo);
                });
            }

            function aplicarFiltro() {
                contenedor.innerHTML = '';
                
                const filtradas = obrasData.filter(o => {
                    const cumpleTipo = filtroActual === 'todos' || o.tipo === filtroActual;
                    const cumpleSubtipo = subfiltroActual === 'todos' || o.subtipo === subfiltroActual;
                    return cumpleTipo && cumpleSubtipo;
                });

                filtradas.forEach(obra => {
                    const obraElement = document.createElement('div');
                    obraElement.className = 'group cursor-pointer w-full';
                    obraElement.innerHTML = `
                        <div class="overflow-hidden bg-neutral-100 aspect-[4/5] relative mb-3 rounded-sm">
                            <img src="${obra.imagen}" alt="${obra.titulo}" class="w-full h-full object-cover transition-transform duration-700 ease-out group-hover:scale-105">
                        </div>
                        <h3 class="font-serif text-base sm:text-lg font-medium text-neutral-800">${obra.titulo}</h3>
                        <p class="text-[10px] sm:text-xs text-neutral-400 uppercase tracking-wider mt-0.5">${obra.tecnica} — ${obra.anio}</p>
                    `;
                    obraElement.addEventListener('click', () => abrirModal(obra));
                    contenedor.appendChild(obraElement);
                });
                actualizarBotones();
                renderizarInfoSubtipos();
            }

            function actualizarBotones() {
                const botones = [
                    { id: 'todos', filtro: 'todos' },
                    { id: 'cuadros', filtro: 'cuadro' },
                    { id: 'ropa', filtro: 'ropa' }
                ];
                botones.forEach(item => {
                    const btn = document.getElementById('btn-' + item.id);
                    if (btn) {
                        if (filtroActual === item.filtro) {
                            btn.classList.add('text-black', 'font-semibold');
                        } else {
                            btn.classList.remove('text-black', 'font-semibold');
                        }
                    }
                });
            }

            document.getElementById('btn-todos').addEventListener('click', () => { 
                filtroActual = 'todos'; 
                subfiltroActual = 'todos'; 
                renderizerSubfiltros();
                aplicarFiltro(); 
            });
            document.getElementById('btn-cuadros').addEventListener('click', () => { 
                filtroActual = 'cuadro'; 
                subfiltroActual = 'todos'; 
                renderizerSubfiltros();
                aplicarFiltro(); 
            });
            document.getElementById('btn-ropa').addEventListener('click', () => { 
                filtroActual = 'ropa'; 
                subfiltroActual = 'todos'; 
                renderizerSubfiltros();
                aplicarFiltro(); 
            });

            // Promesas paralelas para cargar ambos JSON de manera óptima
            Promise.all([
                fetch('obras.json').then(res => res.json()),
                fetch('info.json').then(res => res.json())
            ]).then(([obras, info]) => {
                obrasData = obras;
                infoData = info;
                renderizerSubfiltros();
                aplicarFiltro();
            }).catch(err => console.error("Error cargando los datos de la galería:", err));

            modalCerrar.addEventListener('click', cerrarModal);
            modal.addEventListener('click', (e) => {
                if (e.target === modal) cerrarModal();
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && !modal.classList.contains('hidden')) {
                    cerrarModal();
                }
            });
        });
    </script>
</body>
</html>
