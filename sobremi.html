<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sobre Mí | Herminia López</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap');
        .font-serif { font-family: 'Playfair Display', serif; }
        .font-sans { font-family: 'Inter', sans-serif; }
        
        .titulo-fluido {
            font-size: clamp(1.75rem, 4vw, 2.5rem);
        }
    </style>
</head>
<body class="opacity-0 transition-opacity duration-500 ease-in-out bg-[#fafafa] text-[#1c1c1c] font-sans antialiased flex flex-col min-h-screen text-base">

    <div id="nav-placeholder"></div>

    <main class="flex-grow w-full">
        <!-- Sección Biografía -->
        <section class="bg-white py-10 md:py-16 px-4 sm:px-6">
            <div class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-12 items-center">
                <!-- Contenedor imagen adaptable -->
                <div class="w-full max-w-md mx-auto md:max-w-none aspect-square bg-neutral-100 overflow-hidden rounded-sm shadow-sm">
                    <img src="img/principales/foto2.webp" alt="Herminia López" class="w-full h-full object-cover filter grayscale contrast-125">
                </div>
                <!-- Texto -->
                <div class="text-left">
                    <h2 class="font-serif titulo-fluido font-normal mb-4 md:mb-6">Detrás del Lienzo</h2>
                    <p class="text-neutral-600 font-light text-sm sm:text-base leading-relaxed mb-4">
                        Aquí puedes escribir tu biografía o declaración de artista. Explica brevemente tu trayectoria, tus inspiraciones y las técnicas que más disfrutas plasmar en tus obras.
                    </p>
                </div>
            </div>
        </section>

        <!-- Sección de Llamada a la Acción (CTA) -->
        <section class="max-w-xl mx-auto px-4 sm:px-6 py-12 md:py-16 text-center border-t border-neutral-100">
            <h2 class="font-serif text-2xl sm:text-3xl font-normal mb-4">¿Te interesa alguna obra?</h2>
            <div class="font-medium mt-6">
                <p class="inline-block text-base sm:text-lg text-neutral-800 break-all py-2">
                    hermilopezvico@gmail.com
                </p>
            </div>
        </section>
    </main>

    <div id="footer-placeholder" class="mt-auto"></div>

    <script src="componentes.js"></script>
</body>
</html>
